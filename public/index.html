<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ShipStation → Printful Bridge</title>
  <style>
    :root { font-family: Arial, sans-serif; color: #111; background: #f4f5f7; }
    body { margin: 0; }
    main { max-width: 1120px; margin: auto; padding: 28px 18px 60px; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:14px; }
    .card { background:#fff; border:1px solid #ddd; border-radius:12px; padding:18px; margin-bottom:14px; }
    .good { color:#08783e; font-weight:700; }
    .bad { color:#b42318; font-weight:700; }
    .warn { color:#9a6700; font-weight:700; }
    button { border:0; border-radius:8px; padding:11px 16px; font-weight:700; cursor:pointer; background:#111; color:#fff; }
    input { padding:10px; border:1px solid #bbb; border-radius:8px; width:min(340px,100%); box-sizing:border-box; }
    pre { background:#111; color:#eee; border-radius:8px; padding:14px; overflow:auto; max-height:520px; white-space:pre-wrap; }
    table { width:100%; border-collapse:collapse; font-size:14px; }
    th,td { text-align:left; border-bottom:1px solid #eee; padding:9px 6px; vertical-align:top; }
  </style>
</head>
<body>
<main>
  <h1>ShipStation → Printful Bridge v3</h1>
  <p>Imports orders from the selected ShipStation store where Custom Field 1 equals <strong>Printful</strong>.</p>

  <div class="grid">
    <section class="card">
      <h2>Connections</h2>
      <div id="connections">Checking…</div>
    </section>
    <section class="card">
      <h2>Mode</h2>
      <div id="mode">Loading…</div>
      <div id="suffix"></div>
    </section>
  </div>

  <section class="card">
    <h2>Actions</h2>
    <input id="token" type="password" placeholder="Admin token, if configured">
    <button id="run">Import Orders</button>
    <button id="syncTracking">Sync Tracking</button>
    <span id="runStatus"></span>
  </section>

  <section class="card">
    <h2>Orders</h2>
    <div id="orders">No run loaded.</div>
  </section>

  <section class="card">
    <h2>Raw result</h2>
    <pre id="raw">No run loaded.</pre>
  </section>
</main>

<script>
const el = id => document.getElementById(id);
const cls = ok => ok ? 'good' : 'bad';

function render(data) {
  el('raw').textContent = JSON.stringify(data, null, 2);

  const orders = data.orders || [];
  if (!orders.length) {
    el('orders').innerHTML = '<p>No matching orders found.</p>';
    return;
  }

  el('orders').innerHTML = `
    <table>
      <thead><tr><th>Order</th><th>Recipient</th><th>Items</th><th>Status</th></tr></thead>
      <tbody>${orders.map(order => `
        <tr>
          <td><strong>${order.orderNumber}</strong><br><small>${order.orderId}</small></td>
          <td>${order.recipient || ''}<br><small>${order.country || ''}</small></td>
          <td>${(order.items || []).map(item => `${item.quantity}× ${item.name || item.sku || '(item)'}`).join('<br>')}</td>
          <td>${order.bridgeStatus}${order.printfulExternalId ? `<br><small>${order.printfulExternalId}</small>` : ''}${order.error ? `<br><small>${order.error}</small>` : ''}</td>
        </tr>`).join('')}</tbody>
    </table>`;
}

async function loadStatus() {
  const response = await fetch('/api/status');
  const data = await response.json();

  el('connections').innerHTML = `
    <p class="${cls(data.shipstation?.connected)}">ShipStation: ${data.shipstation?.connected ? 'Connected' : 'Failed'}</p>
    ${data.shipstation?.selectedStore ? `<p><strong>Store:</strong> ${data.shipstation.selectedStore.storeName} (${data.shipstation.selectedStore.storeId})</p>` : ''}
    <p class="${cls(data.printful?.connected)}">Printful: ${data.printful?.connected ? 'Connected' : 'Failed'}</p>
  `;

  el('mode').innerHTML = `<strong>${String(data.mode || '').toUpperCase()}</strong>`;
  el('suffix').innerHTML = `
    <p><strong>Suffix:</strong> ${data.orderSuffix || '(none)'}</p>
    <p><strong>Item mode:</strong> ${data.customItemMode ? 'Custom title/SKU test' : 'Synced placeholder'}</p>
  `;
  if (data.lastRun) render(data.lastRun);
}

el('run').addEventListener('click', async () => {
  el('runStatus').textContent = ' Running…';
  const headers = { 'Content-Type':'application/json' };
  if (el('token').value) headers['x-admin-token'] = el('token').value;

  const response = await fetch('/api/run', {
    method:'POST',
    headers,
    body:'{}'
  });

  const data = await response.json();
  el('runStatus').textContent = response.ok ? ' Complete.' : ` Error: ${data.error}`;
  if (response.ok) render(data);
});

el('syncTracking').addEventListener('click', async () => {
  el('runStatus').textContent = ' Syncing tracking…';
  const headers = { 'Content-Type':'application/json' };
  if (el('token').value) headers['x-admin-token'] = el('token').value;
  const response = await fetch('/api/sync-tracking', {
    method:'POST',
    headers,
    body:'{}'
  });
  const data = await response.json();
  el('runStatus').textContent = response.ok
    ? ` Tracking complete: ${data.shipstationOrdersMarked || 0} ShipStation order(s) marked shipped.`
    : ` Error: ${data.error}`;
  el('raw').textContent = JSON.stringify(data, null, 2);
});

loadStatus().catch(error => {
  el('connections').textContent = error.message;
});
</script>
</body>
</html>
